services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: regmailnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  px-solver:
    build:
      context: ../px-solver
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PX_BIND: "0.0.0.0:8080"
      PX_KEYS: "/app/config/keys.yaml"
      PX_ALLOWLIST: "/app/config/allowlist.yaml"
    volumes:
      - px-solver-data:/app/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/RegMailNet.Api/Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__Default: "Host=postgres;Database=regmailnet;Username=postgres;Password=postgres"
      PX_SOLVER_URL: "http://px-solver:8080"
    depends_on:
      postgres:
        condition: service_healthy
      px-solver:
        condition: service_started

  ui:
    build:
      context: .
      dockerfile: src/RegMailNet.Ui/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  px-solver-data:
